name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install deps
        run: uv sync

      - name: Lint
        run: make lint

      - name: Test
        run: make test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
